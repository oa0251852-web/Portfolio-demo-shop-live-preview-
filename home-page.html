<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAistudio E-commerce</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #00bfff, #0073e6);
            color: white;
        }
        nav {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .product-features {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .cta {
            text-align: center;
            margin: 30px 0;
        }
        .cta button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: cyan;
            color: black;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        .cta button:hover {
            background-color: #00ccff;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#products">ผลิตภัณฑ์</a>
        <a href="#demo">ดูตัวอย่าง</a>
        <a href="#admin">แผงควบคุม</a>
    </nav>
    <div class="container">
        <h1>ยินดีต้อนรับสู่ PSAistudio</h1>
        <p>ร้านค้าออนไลน์ที่ดีที่สุดสำหรับทุกความต้องการของคุณ!</p>
        <div class="product-features">
            <h2>คุณสมบัติของผลิตภัณฑ์</h2>
            <ul>
                <li>คุณภาพสูง 100%</li>
                <li>การจัดส่งรวดเร็ว</li>
                <li>การสนับสนุนลูกค้าที่ยอดเยี่ยม</li>
            </ul>
        </div>
        <div class="cta">
            <button>ช้อปตอนนี้</button>
            <button>ดูตัวอย่าง</button>
        </div>
    </div>
</body>
</html>
