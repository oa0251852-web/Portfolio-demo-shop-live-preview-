<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSA Studio Landing Page</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1, h2, h3 {
            color: #BB86FC;
        }
        header {
            text-align: center;
            padding: 50px;
        }
        .portfolio {
            padding: 50px;
            background-color: #1E1E1E;
        }
        .live-demo {
            padding: 50px;
            background-color: #2E2E2E;
        }
        .pricing {
            margin-top: 20px;
            padding: 20px;
            background-color: #BB86FC;
            color: black;
            border-radius: 5px;
        }
        .button {
            background-color: #03DAC6;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to PSA Studio</h1>
        <p>Your partner in modern web solutions.</p>
    </header>
    <section class="portfolio">
        <h2>Portfolio Dashboard</h2>
        <h3>Features:</h3>
        <ul>
            <li>Responsive Design</li>
            <li>Interactive Elements</li>
            <li>SEO Optimized</li>
        </ul>
    </section>
    <section class="live-demo">
        <h2>Live Demo Catalog</h2>
        <p>Explore our live demo options:</p>
        <div class="pricing">
            <h3>Pricing Tiers:</h3>
            <p>Basic: $29/month</p>
            <p>Pro: $59/month</p>
            <p>Enterprise: $99/month</p>
            <a href="#" class="button">Get Started</a>
        </div>
    </section>
</body>
</html>
