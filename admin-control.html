<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Admin Control Panel</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            background-color: #f0f8ff;\n            color: #333;\n        }\n        .container {\n            width: 80%;\n            margin: 0 auto;\n            padding: 20px;\n            border: 1px solid #ccc;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);\n            background-color: #ffffff;\n        }\n        h1 {\n            color: #007BFF;\n        }\n        .button {\n            padding: 10px 20px;\n            margin: 10px;\n            color: white;\n            background-color: #007BFF;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n        }\n        .button:hover {\n            background-color: #0056b3;\n        }\n        .login-form {\n            margin-bottom: 20px;\n        }\n        .status-log, .analytics {\n            margin-top: 20px;\n            padding: 10px;\n            border: 1px solid #ccc;\n            border-radius: 5px;\n            background-color: #f8f9fa;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"container\">\n        <h1>Admin Control Panel</h1>\n        <div class=\"login-form\">\n            <h2>Login</h2>\n            <form onsubmit=\"return false;\">\n                <label for=\"username\">Username:</label><br>\n                <input type=\"text\" id=\"username\" value=\"admin\" disabled><br>\n                <label for=\"password\">Password:</label><br>\n                <input type=\"password\" id=\"password\" value=\"1234\" disabled><br><br>\n                <button class=\"button\">Login</button>\n            </form>\n        </div>\n        <div class=\"control-panels\">\n            <h2>Control Panels</h2>\n            <button class=\"button\">Manage Telegram</button>\n            <button class=\"button\">Manage Facebook</button>\n            <button class=\"button\">Manage LINE OA</button>\n        </div>\n        <div class=\"status-log\">\n            <h2>Status Logs</h2>\n            <p>Real-time status log displayed here.</p>\n        </div>\n        <div class=\"analytics\">\n            <h2>System Analytics</h2>\n            <p>Analytics data displayed here.</p>\n        </div>\n    </div>\n</body>\n</html>
